<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>英語學習角落｜愛地球計畫</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<header class="site-header">
  <div class="container">
    <h1>🌍 愛地球計畫 自學平台</h1>
    <nav class="nav">
      <a href="index.html">首頁</a>
      <a href="quiz.html">開始測驗</a>
      <a href="english.html" class="active">英語學習角落</a>
      <a href="writing.html">引導式寫作</a>
      <a href="records.html">查詢我的紀錄</a>
      <a href="worksheet.html">學習單</a>
      <a href="teacher.html">老師專區</a>
    </nav>
  </div>
</header>

<main class="container">

  <section class="card" id="student-form-card">
    <h2>👋 開始之前，先填寫你的資料</h2>
    <div class="grid cols-3">
      <div>
        <label for="input-class">班級</label>
        <input type="text" id="input-class" placeholder="例如：二年一班" />
      </div>
      <div>
        <label for="input-name">姓名</label>
        <input type="text" id="input-name" placeholder="例如：王小美" />
      </div>
      <div>
        <label for="input-seat">座號</label>
        <input type="number" id="input-seat" placeholder="例如：5" />
      </div>
    </div>
    <p class="score-note" id="student-form-hint"></p>
  </section>

  <section id="section-menu">
    <div class="card">
      <h2>🇺🇸 英語學習角落</h2>
      <p>想挑戰更難的內容嗎？來試試跟愛地球主題有關的英文單字和聽力吧！</p>
    </div>
    <div class="grid cols-2">
      <div class="card">
        <h3>📚 英文詞彙</h3>
        <p>看中文提示，選出正確的英文單字，共 10 題。滿分 100 分。</p>
        <button class="btn" onclick="startTest('engVocab')">開始英文詞彙測驗</button>
      </div>
      <div class="card">
        <h3>🎧 英文聽力</h3>
        <p>點選播放按鈕，仔細聽英文句子，回答中文理解題，共 10 題。滿分 100 分。</p>
        <button class="btn secondary" onclick="startTest('engListening')">開始英文聽力測驗</button>
      </div>
    </div>
  </section>

  <section class="card" id="section-test" style="display:none;">
    <h2 id="test-title"></h2>
    <div class="progress-bar"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
    <div id="test-questions"></div>
    <div class="btn-row">
      <button class="btn" id="submit-btn" onclick="submitTest()">交卷</button>
      <button class="btn outline" onclick="backToMenu()">返回測驗選單</button>
    </div>
  </section>

  <section class="card" id="section-result" style="display:none;">
    <h2 id="result-title">測驗結果</h2>
    <div class="score-display" id="result-score">0</div>
    <p class="score-note" id="result-note"></p>
    <div id="result-detail"></div>
    <div class="btn-row">
      <button class="btn" id="retake-btn" onclick="retakeTest()">再測一次（換新題目）</button>
      <button class="btn outline" onclick="backToMenu()">返回測驗選單</button>
      <a class="btn secondary" href="records.html">查看我的所有紀錄</a>
    </div>
  </section>

</main>

<footer class="site-footer">愛地球計畫 自學平台｜設計給國小二年級學生使用</footer>

<script src="js/config.js"></script>
<script src="js/questions.js"></script>
<script src="js/storage.js"></script>
<script src="js/quiz.js"></script>
</body>
</html>
